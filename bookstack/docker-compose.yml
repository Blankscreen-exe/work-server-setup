services:
  bookstack:
    image: lscr.io/linuxserver/bookstack
    container_name: bookstack
    environment:
      - APP_URL=http://84.46.244.158/bookstack
      - APP_KEY=base64:dfCkAwf28wI9AuC7hHaYIdXs2Ftrvb/DABBuIxS8fCo=
      - DB_HOST=bookstack_db
      - DB_USERNAME=bookstack
      - DB_PASSWORD=bookstackpass
      - DB_DATABASE=bookstackapp
      - WAIT_FOR_DB=true
    volumes:
      - ./data:/config
    depends_on:
      - bookstack_db
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      - "traefik.http.routers.bookstack.middlewares=bookstack-strip"
      - "traefik.http.middlewares.bookstack-strip.stripprefix.prefixes=/bookstack"

      - "traefik.http.routers.bookstack.rule=PathPrefix(`/bookstack`)"
      - "traefik.http.routers.bookstack.entrypoints=web"
      - "traefik.http.services.bookstack.loadbalancer.server.port=80"

  bookstack_db:
    image: mariadb:11
    container_name: bookstack_db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=bookstackapp
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=bookstackpass
    volumes:
      - ./db:/var/lib/mysql
    networks:
      - internal

networks:
  proxy:
    external: true
  internal:
    driver: bridge
